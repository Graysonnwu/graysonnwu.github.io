<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贰鼠自用小工具</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d25;
      --text: #e6e6e6;
      --sub: #9aa4b2;
      --accent: #4f8cff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .section {
      margin-top: 40px;
    }

    .section h2 {
      margin-bottom: 20px;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(79,140,255,0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card:hover::after {
      opacity: 1;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      margin: 0;
      color: var(--sub);
      font-size: 0.9em;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--sub);
      font-size: 0.85em;
    }

  </style>
</head>
<body>

<header>
  <h1>贰鼠自用小工具</h1>
</header>

<div class="container">

  <!-- ================= 字幕工具 ================= -->
  <div class="section">
    <h2>字幕工具</h2>
    <div class="grid">

      <!-- 工具卡片模板（复制下面这一段即可添加新工具） -->
      <!--
      <a class="card" href="your_tool_path/">
        <h3>工具名称</h3>
        <p>一句简短描述</p>
      </a>
      -->

      <a class="card" href="ass_align/">
        <h3>字幕双语对齐</h3>
        <p>ASS 字幕时间轴自动对齐工具</p>
      </a>

      <a class="card" href="ass_editor/">
        <h3>字幕预览</h3>
        <p>实时预览 ASS 字幕效果</p>
      </a>

      <a class="card" href="ass_tools/">
        <h3>字幕综合工具</h3>
        <p>坐标拾取、取色与净化</p>
      </a>
    </div>
  </div>

  <!-- ================= B站工具 ================= -->
  <div class="section">
    <h2>B站工具</h2>
    <div class="grid">

      <a class="card" href="bili_fans_track/">
        <h3>粉丝数可视化</h3>
        <p>Bilibili 粉丝增长趋势分析</p>
      </a>

      <a class="card" href="bili_thumbnail_preview/">
        <h3>封面预览</h3>
        <p>B站视频封面查看工具</p>
      </a>
    </div>
  </div>

  <!-- ================= 焦散透镜 ================= -->
  <div class="section">
    <h2>焦散透镜</h2>
    <div class="grid">

      <a class="card" href="caustic_lens_centroid/">
        <h3>亮度重心平衡</h3>
        <p>焦散投影亮度分布优化工具</p>
      </a>
    </div>
  </div>

  <!-- ================= 新分类模板 ================= -->
  <!--
  <div class="section">
    <h2>新分类名称</h2>
    <div class="grid">
      <a class="card" href="example/">
        <h3>示例工具</h3>
        <p>描述</p>
      </a>
    </div>
  </div>
  -->

</div>

<footer>
  © 2026 贰鼠 · GitHub Pages
</footer>

</body>
</html>
